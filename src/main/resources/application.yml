spring:
  application:
    name: chatbot

  # --- Step 2.6: Postgres datasource (pgvector container) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/chatbot
    username: chatbot
    password: chatbot
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  ai:
    # --- Step 2.7: Company LLM (Groq, OpenAI-compatible API) ---
    openai:
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY}
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.2
      # Disable OpenAI embeddings — we use the local ONNX model instead
      embedding:
        enabled: false

    # --- Step 2.9: Local embedding model (all-MiniLM-L6-v2 via ONNX) ---
    model:
      embedding: transformers
    transformers:
      embedding:
        # Fixed cache dir so the ~90MB ONNX model downloads once, not on every restart
        cache:
          directory: ${user.home}/.cache/chatbot-onnx

    # --- Step 2.8: pgvector configuration ---
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 384
        distance-type: COSINE_DISTANCE
        index-type: HNSW

# Department-scoped access: uploads and questions are tagged/filtered by one
# of these. With SSO (Step 5) the department will come from JWT claims instead.
chatbot:
  departments: General,HR,Engineering,Finance

---
# --- Alternative LLM: Google AI Studio (Gemini) via its OpenAI-compatible API ---
# Activate with:  mvn spring-boot:run -Dspring-boot.run.profiles=gemini
# (requires GOOGLE_API_KEY env var; embeddings stay local, so no re-ingestion needed)
spring:
  config:
    activate:
      on-profile: gemini
  ai:
    openai:
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      api-key: ${GOOGLE_API_KEY}
      chat:
        options:
          model: gemini-2.5-flash
          temperature: 0.2
