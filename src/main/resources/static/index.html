<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: #1a1a2e; color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .hdr-btn {
    background: #4f6df5; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; cursor: pointer;
  }
  .hdr-btn.secondary { background: #33334d; }
  .hdr-btn:hover { filter: brightness(1.1); }
  .hdr-btn:disabled { background: #666; cursor: wait; }
  #upload-status { font-size: 13px; color: #a8b3cf; max-width: 280px; }

  #main { flex: 1; display: flex; overflow: hidden; }

  /* Documents sidebar */
  #sidebar {
    width: 280px; background: #fff; border-right: 1px solid #e2e6ee;
    display: none; flex-direction: column; overflow-y: auto;
  }
  #sidebar.open { display: flex; }
  #sidebar h2 { font-size: 14px; padding: 14px 16px 8px; color: #6b7280; }
  .doc-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid #f0f2f5; font-size: 13px; gap: 8px;
  }
  .doc-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-item .meta { color: #9ca3af; font-size: 11px; }
  .doc-del {
    background: none; border: none; color: #b91c1c; cursor: pointer; font-size: 15px;
  }
  .doc-empty { padding: 16px; color: #9ca3af; font-size: 13px; }

  #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 12px; max-width: 860px;
    width: 100%; margin: 0 auto;
  }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #4f6df5; color: #fff; border-bottom-right-radius: 4px; }
  .bot { align-self: flex-start; background: #fff; color: #1a1a2e; border: 1px solid #e2e6ee; border-bottom-left-radius: 4px; }
  .bot .sources { margin-top: 8px; font-size: 12px; color: #6b7280; }
  .bot.thinking { color: #6b7280; font-style: italic; }
  .error { background: #fde8e8; color: #b91c1c; border-color: #f5c2c2; }

  footer { padding: 10px 24px 18px; }
  .input-row { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; }
  #question {
    flex: 1; padding: 13px 16px; font-size: 15px; border: 1px solid #d3d9e3;
    border-radius: 12px; outline: none; background: #fff;
  }
  #question:focus { border-color: #4f6df5; }
  #send {
    background: #4f6df5; color: #fff; border: none; border-radius: 12px;
    padding: 0 24px; font-size: 15px; cursor: pointer;
  }
  #send:hover { background: #3d5ae0; }
  #send:disabled { background: #a5b0d6; cursor: wait; }
  #retention-notice {
    max-width: 860px; margin: 6px auto 0; font-size: 11px; color: #9ca3af; text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>📚 RAG Chatbot</h1>
  <div class="header-actions">
    <span id="upload-status"></span>
    <input type="file" id="file-input" hidden>
    <button class="hdr-btn secondary" id="docs-btn">🗂 Documents</button>
    <button class="hdr-btn secondary" id="new-chat-btn">✨ New chat</button>
    <button class="hdr-btn" id="upload-btn">📄 Upload</button>
  </div>
</header>

<div id="main">
  <aside id="sidebar">
    <h2>Uploaded documents</h2>
    <div id="doc-list"><div class="doc-empty">Loading…</div></div>
  </aside>

  <div id="chat-area">
    <div id="chat">
      <div class="msg bot">Hi! Upload a document (PDF, DOCX, TXT…), then ask me questions about it. Follow-up questions are supported.</div>
    </div>
    <footer>
      <div class="input-row">
        <input id="question" type="text" placeholder="Ask a question about your documents…" autocomplete="off">
        <button id="send">Send</button>
      </div>
      <div id="retention-notice"></div>
    </footer>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const questionInput = document.getElementById('question');
const sendBtn = document.getElementById('send');
const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');
const uploadStatus = document.getElementById('upload-status');
const sidebar = document.getElementById('sidebar');
const docList = document.getElementById('doc-list');

let sessionId = localStorage.getItem('chatSessionId') || null;

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSources(msgDiv, sources) {
  if (!sources || !sources.length) return;
  const src = document.createElement('div');
  src.className = 'sources';
  src.textContent = '📎 ' + sources.join(', ');
  msgDiv.appendChild(src);
}

/* --- Streaming chat over SSE (fetch-based reader) --- */
async function send() {
  const q = questionInput.value.trim();
  if (!q) return;
  questionInput.value = '';
  addMsg(q, 'user');
  sendBtn.disabled = true;
  const botDiv = addMsg('Thinking…', 'bot thinking');
  let sources = [];

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, question: q })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', answer = '', started = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Parse SSE frames (separated by blank lines)
      let idx;
      while ((idx = buffer.indexOf('\n\n')) >= 0) {
        const frame = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        let event = 'message';
        const dataLines = [];
        for (const line of frame.split('\n')) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          else if (line.startsWith('data:')) dataLines.push(line.slice(5).replace(/^ /, ''));
        }
        const data = dataLines.join('\n');
        if (event === 'meta') {
          const meta = JSON.parse(data);
          sessionId = meta.sessionId;
          localStorage.setItem('chatSessionId', sessionId);
          sources = meta.sources || [];
        } else if (event === 'token') {
          if (!started) { botDiv.classList.remove('thinking'); botDiv.textContent = ''; started = true; }
          answer += data;
          botDiv.textContent = answer;
          chat.scrollTop = chat.scrollHeight;
        } else if (event === 'done') {
          addSources(botDiv, sources);
        }
      }
    }
    if (!started) { botDiv.classList.remove('thinking'); }
  } catch (e) {
    botDiv.className = 'msg bot error';
    botDiv.textContent = 'Error: ' + e.message;
  } finally {
    sendBtn.disabled = false;
    questionInput.focus();
  }
}

sendBtn.addEventListener('click', send);
questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

/* --- New chat (fresh session) --- */
document.getElementById('new-chat-btn').addEventListener('click', () => {
  sessionId = null;
  localStorage.removeItem('chatSessionId');
  chat.innerHTML = '';
  addMsg('New conversation started. Ask away!', 'bot');
});

/* --- Restore history on page load --- */
async function restoreHistory() {
  if (!sessionId) return;
  try {
    const res = await fetch('/api/chat/' + sessionId + '/history');
    if (!res.ok) return;
    const messages = await res.json();
    if (messages.length) chat.innerHTML = '';
    for (const m of messages) {
      const div = addMsg(m.content, m.role === 'user' ? 'user' : 'bot');
      if (m.role === 'assistant' && m.sources) addSources(div, m.sources.split(','));
    }
  } catch (e) { /* history is best-effort */ }
}

/* --- Upload --- */
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  uploadBtn.disabled = true;
  uploadStatus.textContent = 'Uploading ' + file.name + '…';
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/documents/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'upload failed');
    uploadStatus.textContent = '✅ ' + data.filename + ' (' + data.chunksStored + ' chunks)';
    addMsg('Document "' + data.filename + '" ingested (' + data.chunksStored + ' chunks). Ask away!', 'bot');
    loadDocuments();
  } catch (e) {
    uploadStatus.textContent = '❌ ' + e.message;
  } finally {
    uploadBtn.disabled = false;
    fileInput.value = '';
  }
});

/* --- Documents sidebar --- */
document.getElementById('docs-btn').addEventListener('click', () => {
  sidebar.classList.toggle('open');
  if (sidebar.classList.contains('open')) loadDocuments();
});

async function loadDocuments() {
  try {
    const res = await fetch('/api/documents');
    const docs = await res.json();
    if (!docs.length) {
      docList.innerHTML = '<div class="doc-empty">No documents uploaded yet.</div>';
      return;
    }
    docList.innerHTML = '';
    for (const d of docs) {
      const item = document.createElement('div');
      item.className = 'doc-item';
      const info = document.createElement('div');
      info.innerHTML = '<div class="name">' + d.filename + '</div>' +
        '<div class="meta">' + d.chunkCount + ' chunks · ' + new Date(d.uploadedAt).toLocaleString() + '</div>';
      const del = document.createElement('button');
      del.className = 'doc-del';
      del.textContent = '🗑';
      del.title = 'Delete document';
      del.addEventListener('click', async () => {
        if (!confirm('Delete "' + d.filename + '" and all its chunks?')) return;
        await fetch('/api/documents/' + d.id, { method: 'DELETE' });
        loadDocuments();
      });
      item.appendChild(info);
      item.appendChild(del);
      docList.appendChild(item);
    }
  } catch (e) {
    docList.innerHTML = '<div class="doc-empty">Failed to load documents.</div>';
  }
}

/* --- Retention notice --- */
fetch('/api/config').then(r => r.json()).then(cfg => {
  document.getElementById('retention-notice').textContent =
    'Chat history is stored to support follow-up questions and is automatically deleted after ' +
    cfg.retentionDays + ' days.';
}).catch(() => {});

restoreHistory();
questionInput.focus();
</script>
</body>
</html>
