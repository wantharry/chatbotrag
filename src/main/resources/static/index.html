<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: #1a1a2e; color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .upload-area { display: flex; align-items: center; gap: 10px; }
  .upload-btn {
    background: #4f6df5; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; cursor: pointer;
  }
  .upload-btn:hover { background: #3d5ae0; }
  .upload-btn:disabled { background: #666; cursor: wait; }
  #upload-status { font-size: 13px; color: #a8b3cf; max-width: 320px; }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 12px; max-width: 860px;
    width: 100%; margin: 0 auto;
  }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #4f6df5; color: #fff; border-bottom-right-radius: 4px; }
  .bot { align-self: flex-start; background: #fff; color: #1a1a2e; border: 1px solid #e2e6ee; border-bottom-left-radius: 4px; }
  .bot .sources { margin-top: 8px; font-size: 12px; color: #6b7280; }
  .bot.thinking { color: #6b7280; font-style: italic; }
  .error { background: #fde8e8; color: #b91c1c; border-color: #f5c2c2; }
  footer { padding: 16px 24px 24px; background: transparent; }
  .input-row {
    max-width: 860px; margin: 0 auto; display: flex; gap: 10px;
  }
  #question {
    flex: 1; padding: 13px 16px; font-size: 15px; border: 1px solid #d3d9e3;
    border-radius: 12px; outline: none; background: #fff;
  }
  #question:focus { border-color: #4f6df5; }
  #send {
    background: #4f6df5; color: #fff; border: none; border-radius: 12px;
    padding: 0 24px; font-size: 15px; cursor: pointer;
  }
  #send:hover { background: #3d5ae0; }
  #send:disabled { background: #a5b0d6; cursor: wait; }
</style>
</head>
<body>
<header>
  <h1>📚 RAG Chatbot</h1>
  <div class="upload-area">
    <span id="upload-status"></span>
    <input type="file" id="file-input" hidden>
    <button class="upload-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">📄 Upload document</button>
  </div>
</header>

<div id="chat">
  <div class="msg bot">Hi! Upload a document (PDF, DOCX, TXT…), then ask me questions about it.</div>
</div>

<footer>
  <div class="input-row">
    <input id="question" type="text" placeholder="Ask a question about your documents…" autocomplete="off">
    <button id="send">Send</button>
  </div>
</footer>

<script>
const chat = document.getElementById('chat');
const questionInput = document.getElementById('question');
const sendBtn = document.getElementById('send');
const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');
const uploadStatus = document.getElementById('upload-status');

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const q = questionInput.value.trim();
  if (!q) return;
  questionInput.value = '';
  addMsg(q, 'user');
  sendBtn.disabled = true;
  const thinking = addMsg('Thinking…', 'bot thinking');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    thinking.classList.remove('thinking');
    thinking.textContent = data.answer;
    if (data.sources && data.sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.textContent = '📎 ' + data.sources.join(', ');
      thinking.appendChild(src);
    }
  } catch (e) {
    thinking.className = 'msg bot error';
    thinking.textContent = 'Error: ' + e.message;
  } finally {
    sendBtn.disabled = false;
    questionInput.focus();
  }
}

sendBtn.addEventListener('click', send);
questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  uploadBtn.disabled = true;
  uploadStatus.textContent = 'Uploading ' + file.name + '…';
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/documents/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'upload failed');
    uploadStatus.textContent = '✅ ' + data.filename + ' (' + data.chunksStored + ' chunks)';
    addMsg('Document "' + data.filename + '" ingested (' + data.chunksStored + ' chunks). Ask away!', 'bot');
  } catch (e) {
    uploadStatus.textContent = '❌ ' + e.message;
  } finally {
    uploadBtn.disabled = false;
    fileInput.value = '';
  }
});

questionInput.focus();
</script>
</body>
</html>
